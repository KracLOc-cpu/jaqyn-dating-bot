# Prod overlay. Запуск:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Отличия от local:
#   * MinIO нет — S3_ENDPOINT в .env указывает на Cloudflare R2
#   * Traefik терминирует HTTPS (Let's Encrypt) для api/webhook
#   * Redis с appendonly — переживает рестарт без потери онбордингов
#   * порты БД/Redis наружу не публикуем

services:
  postgres:
    ports: []

  redis:
    command: redis-server --appendonly yes
    ports: []
    volumes:
      - redis_data:/data

  # MinIO в проде не нужен — отключаем масштабированием в 0 через профиль.
  # Проще: в prod просто не объявляем minio, а api ходит в R2 по S3_ENDPOINT.
  minio:
    profiles: ["donotstart"]

  traefik:
    image: traefik:v3
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/certs/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs

  api:
    ports: []
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=le
      - traefik.http.services.api.loadbalancer.server.port=8000

  mini_app:
    ports: []
    build:
      context: ./mini_app
      args:
        VITE_API_URL: https://${API_DOMAIN}
        VITE_USE_MOCKS: "false"
    labels:
      - traefik.enable=true
      - traefik.http.routers.mini-app.rule=Host(`${MINI_APP_DOMAIN}`)
      - traefik.http.routers.mini-app.entrypoints=websecure
      - traefik.http.routers.mini-app.tls.certresolver=le
      - traefik.http.services.mini-app.loadbalancer.server.port=80

  bot:
    environment:
      BOT_MODE: webhook

volumes:
  redis_data:
  traefik_certs:
